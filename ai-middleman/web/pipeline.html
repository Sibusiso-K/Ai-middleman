<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Middleman — Live Pipeline</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100dvh; display: flex; flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0e1117; color: #fafafa;
  }
  header { padding: 16px 20px 8px; flex-shrink: 0; }
  header h1 { margin: 0; font-size: 1.25rem; }
  header p { margin: 4px 0 0; font-size: 0.8rem; color: #9aa0a6; }
  #status { font-size: 0.72rem; margin-top: 6px; }
  #status.ok { color: #3dd56d; }
  #status.bad { color: #ff6b6b; }
  #config {
    padding: 8px 20px; font-size: 0.75rem;
    display: flex; gap: 6px; align-items: center; flex-shrink: 0;
  }
  #config input {
    flex: 1; max-width: 480px; background: #1c1f26; border: 1px solid #333844; color: #fafafa;
    border-radius: 6px; padding: 6px 8px; font-size: 0.75rem;
  }
  #config button {
    background: #333844; border: none; color: #fafafa; border-radius: 6px;
    padding: 6px 10px; font-size: 0.72rem; cursor: pointer;
  }

  /* --- Flow diagram --- */
  #flow {
    display: flex; align-items: stretch; justify-content: center; gap: 6px;
    padding: 28px 16px; flex-wrap: wrap; flex-shrink: 0;
  }
  .node {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; width: 150px; padding: 16px 10px; border-radius: 14px;
    background: #1a1d24; border: 2px solid #2a2e38; transition: all 0.35s ease;
  }
  .node .icon { font-size: 1.6rem; }
  .node .label { font-size: 0.78rem; text-align: center; color: #c7cbd1; line-height: 1.25; }
  .node.active {
    border-color: #3dd56d; background: #12241a;
    box-shadow: 0 0 22px rgba(61, 213, 109, 0.45);
    transform: scale(1.06);
  }
  .node.active .label { color: #fafafa; font-weight: 600; }
  .arrow { align-self: center; font-size: 1.4rem; color: #40454f; transition: color 0.35s ease; }
  .arrow.active { color: #3dd56d; }

  /* --- Live feed --- */
  #feedWrap { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
  #feedWrap h2 { font-size: 0.85rem; color: #9aa0a6; margin: 8px 0; font-weight: 600; }
  #feed { display: flex; flex-direction: column-reverse; gap: 6px; }
  .entry {
    display: flex; gap: 10px; padding: 8px 12px; border-radius: 8px;
    background: #161920; font-size: 0.86rem; animation: fadeIn 0.4s ease;
    border-left: 3px solid #333844;
  }
  .entry .t { color: #6b7280; font-size: 0.72rem; white-space: nowrap; padding-top: 1px; }
  .entry.received { border-left-color: #4dabf7; }
  .entry.relaying { border-left-color: #4dabf7; }
  .entry.checking { border-left-color: #9775fa; }
  .entry.intent { border-left-color: #9775fa; }
  .entry.matching { border-left-color: #ffa94d; }
  .entry.drafting { border-left-color: #ffa94d; }
  .entry.awaiting_approval { border-left-color: #ffd43b; }
  .entry.resolved { border-left-color: #3dd56d; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  #empty { color: #6b7280; font-size: 0.85rem; padding: 12px 0; }
</style>
</head>
<body>
  <header>
    <h1>🛰️ AI Middleman — Live Pipeline</h1>
    <p>What the server is doing right now, translated from the terminal into plain English.</p>
    <div id="status">connecting…</div>
  </header>

  <div id="config">
    <span>API:</span>
    <input id="apiBase" type="text" spellcheck="false" />
    <button id="saveApi">Save</button>
  </div>

  <div id="flow"></div>

  <div id="feedWrap">
    <h2>Activity feed</h2>
    <div id="feed"><div id="empty">Waiting for the next message…</div></div>
  </div>

<script>
const DEFAULT_API_BASE = "https://plating-marmalade-outthink.ngrok-free.dev";
const params = new URLSearchParams(location.search);
let apiBase = params.get("api") || localStorage.getItem("friendApiBase") || DEFAULT_API_BASE;

const apiInput = document.getElementById("apiBase");
const statusEl = document.getElementById("status");
const feedEl = document.getElementById("feed");
const emptyEl = document.getElementById("empty");
apiInput.value = apiBase;
document.getElementById("saveApi").onclick = () => {
  apiBase = apiInput.value.trim().replace(/\/$/, "");
  localStorage.setItem("friendApiBase", apiBase);
  since = 0;
  feedEl.innerHTML = "";
  poll();
};

// Ordered left-to-right; each maps to one or more backend stage keys.
const STAGE_NODES = [
  { key: "received",          icon: "📩", label: "Message received" },
  { key: "relaying",          icon: "📡", label: "Relaying to Alex" },
  { key: "checking",          icon: "🔍", label: "Quick pattern check" },
  { key: "intent",            icon: "🧠", label: "AI: is this a request?" },
  { key: "matching",          icon: "🔗", label: "Matching contacts" },
  { key: "drafting",          icon: "✍️", label: "Writing a draft" },
  { key: "awaiting_approval", icon: "📤", label: "Waiting on Alex" },
  { key: "resolved",          icon: "✅", label: "Resolved" },
];

const flowEl = document.getElementById("flow");
STAGE_NODES.forEach((s, i) => {
  const node = document.createElement("div");
  node.className = "node";
  node.id = `node-${s.key}`;
  node.innerHTML = `<div class="icon">${s.icon}</div><div class="label">${s.label}</div>`;
  flowEl.appendChild(node);
  if (i < STAGE_NODES.length - 1) {
    const arrow = document.createElement("div");
    arrow.className = "arrow";
    arrow.id = `arrow-${i}`;
    arrow.textContent = "→";
    flowEl.appendChild(arrow);
  }
});

const activeTimers = {};
function pulse(stage) {
  const node = document.getElementById(`node-${stage}`);
  if (!node) return;
  const idx = STAGE_NODES.findIndex(s => s.key === stage);
  node.classList.add("active");
  if (idx > 0) document.getElementById(`arrow-${idx - 1}`)?.classList.add("active");
  clearTimeout(activeTimers[stage]);
  activeTimers[stage] = setTimeout(() => {
    node.classList.remove("active");
    if (idx > 0) document.getElementById(`arrow-${idx - 1}`)?.classList.remove("active");
  }, 2200);
}

function fmtTime(ts) {
  return new Date(ts * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
}

function addEntries(events) {
  if (!events.length) return;
  if (emptyEl.parentNode) feedEl.removeChild(emptyEl);
  events.forEach(e => {
    pulse(e.stage);
    const div = document.createElement("div");
    div.className = `entry ${e.stage}`;
    div.innerHTML = `<span class="t">${fmtTime(e.ts)}</span><span>${e.message}</span>`;
    feedEl.prepend(div);
  });
  while (feedEl.children.length > 60) feedEl.removeChild(feedEl.lastChild);
}

let since = 0;
async function poll() {
  try {
    const res = await fetch(`${apiBase}/pipeline/events?since=${since}`, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    since = data.since ?? since;
    addEntries(data.events || []);
    statusEl.textContent = "connected";
    statusEl.className = "ok";
  } catch (err) {
    statusEl.textContent = `disconnected (${err.message}) — check the API address above`;
    statusEl.className = "bad";
  }
}

poll();
setInterval(poll, 800);
</script>
</body>
</html>
