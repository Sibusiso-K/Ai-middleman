<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Friend — Sam</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100dvh; display: flex; flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0e1117; color: #fafafa;
  }
  header {
    padding: 14px 16px; border-bottom: 1px solid #262730; flex-shrink: 0;
  }
  header h1 { margin: 0; font-size: 1.1rem; }
  header p { margin: 4px 0 0; font-size: 0.78rem; color: #9aa0a6; }
  #status { font-size: 0.72rem; margin-top: 6px; }
  #status.ok { color: #3dd56d; }
  #status.bad { color: #ff6b6b; }
  #config {
    padding: 8px 16px; border-bottom: 1px solid #262730; font-size: 0.75rem;
    display: flex; gap: 6px; align-items: center; flex-shrink: 0;
  }
  #config input {
    flex: 1; background: #1c1f26; border: 1px solid #333844; color: #fafafa;
    border-radius: 6px; padding: 6px 8px; font-size: 0.75rem;
  }
  #config button {
    background: #333844; border: none; color: #fafafa; border-radius: 6px;
    padding: 6px 10px; font-size: 0.72rem; cursor: pointer;
  }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 14px; display: flex;
    flex-direction: column; gap: 10px;
  }
  .bubble {
    max-width: 78%; padding: 10px 13px; border-radius: 14px; font-size: 0.92rem;
    line-height: 1.35; white-space: pre-wrap; word-break: break-word;
  }
  .sam { align-self: flex-end; background: #1f6f4a; border-bottom-right-radius: 3px; }
  .alex { align-self: flex-start; background: #262730; border-bottom-left-radius: 3px; }
  .system {
    align-self: center; font-size: 0.75rem; color: #9aa0a6; font-style: italic;
    padding: 2px 8px;
  }
  #empty { align-self: center; color: #6b7280; font-size: 0.85rem; margin-top: 24px; }
  #pipeline {
    flex-shrink: 0; border-top: 1px solid #262730; background: #14161c;
    max-height: 0; overflow: hidden; transition: max-height 0.2s ease;
  }
  #pipeline.open { max-height: 110px; }
  #pipelineToggle {
    width: 100%; text-align: left; background: none; border: none; color: #9aa0a6;
    font-size: 0.72rem; padding: 6px 14px; cursor: pointer;
  }
  #pipelineLog { padding: 0 14px 8px; overflow-y: auto; max-height: 84px; }
  #pipelineLog div { font-size: 0.72rem; color: #c8ccd4; padding: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #pipelineLog div.latest { color: #3dd56d; }
  form {
    display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid #262730; flex-shrink: 0;
  }
  input[type="text"] {
    flex: 1; background: #1c1f26; border: 1px solid #333844; color: #fafafa;
    border-radius: 10px; padding: 12px 14px; font-size: 1rem;
  }
  button[type="submit"] {
    background: #1f6f4a; border: none; color: white; border-radius: 10px;
    padding: 0 18px; font-size: 1rem; cursor: pointer;
  }
  button[type="submit"]:disabled { opacity: 0.5; }
</style>
</head>
<body>
  <header>
    <h1>🧑 Friend — Sam</h1>
    <p>Chat as Sam. Messages relay to Alex's real WhatsApp; his replies come back here.</p>
    <div id="status">connecting…</div>
  </header>

  <div id="config">
    <span>API:</span>
    <input id="apiBase" type="text" spellcheck="false" />
    <button id="saveApi">Save</button>
  </div>

  <div id="messages"><div id="empty">No messages yet. Say hi below 👇</div></div>

  <div id="pipeline">
    <div id="pipelineLog"></div>
  </div>
  <button id="pipelineToggle" type="button">🔎 Pipeline status ▾</button>

  <form id="composer">
    <input id="text" type="text" placeholder="Message as Sam…" autocomplete="off" />
    <button type="submit">Send</button>
  </form>

<script>
// Default points at the reserved ngrok tunnel used during this project's
// local dev/demo setup. Override via ?api=https://your-backend, or the
// Save button below (persisted in localStorage) — no rebuild needed.
const DEFAULT_API_BASE = "https://plating-marmalade-outthink.ngrok-free.dev";

const params = new URLSearchParams(location.search);
let apiBase = params.get("api") || localStorage.getItem("friendApiBase") || DEFAULT_API_BASE;

const apiInput = document.getElementById("apiBase");
const statusEl = document.getElementById("status");
const messagesEl = document.getElementById("messages");
const emptyEl = document.getElementById("empty");
const form = document.getElementById("composer");
const textInput = document.getElementById("text");

apiInput.value = apiBase;
document.getElementById("saveApi").onclick = () => {
  apiBase = apiInput.value.trim().replace(/\/$/, "");
  localStorage.setItem("friendApiBase", apiBase);
  renderedIds.clear();
  messagesEl.innerHTML = "";
  poll();
};

let renderedIds = new Set();

function bubble(cls, text) {
  const div = document.createElement("div");
  div.className = cls;
  div.textContent = text;
  return div;
}

function render(events) {
  if (!events.length) {
    messagesEl.innerHTML = "";
    messagesEl.appendChild(emptyEl);
    return;
  }
  if (emptyEl.parentNode) messagesEl.removeChild(emptyEl);

  // Figure out which draft_suggested events are still unresolved.
  const RESOLUTIONS = new Set(["draft_sent", "draft_edited", "draft_skipped"]);
  function isResolved(idx) {
    for (let k = idx + 1; k < events.length; k++) {
      const nt = events[k].event_type;
      if (nt === "draft_suggested") break;
      if (RESOLUTIONS.has(nt)) return true;
    }
    return false;
  }

  events.forEach((e, i) => {
    if (renderedIds.has(e.id)) return;
    renderedIds.add(e.id);
    const p = e.payload || {};
    let node = null;
    if (e.event_type === "friend_message") node = bubble("bubble sam", p.text || "");
    else if (e.event_type === "alex_reply") node = bubble("bubble alex", p.text || "");
    else if (e.event_type === "draft_sent") node = bubble("bubble alex", p.final_text || "");
    else if (e.event_type === "draft_skipped") node = bubble("system", "— Alex skipped a suggested reply —");
    else if (e.event_type === "draft_suggested" && !isResolved(i)) node = bubble("system", "⏳ Alex has a suggested reply pending on his WhatsApp…");
    if (node) messagesEl.appendChild(node);
  });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function poll() {
  try {
    const res = await fetch(`${apiBase}/friend/thread`, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data.events || []);
    statusEl.textContent = "connected";
    statusEl.className = "ok";
  } catch (err) {
    statusEl.textContent = `disconnected (${err.message}) — check the API address above`;
    statusEl.className = "bad";
  }
}

form.addEventListener("submit", async (ev) => {
  ev.preventDefault();
  const text = textInput.value.trim();
  if (!text) return;
  textInput.value = "";
  pipelineOpen(true);
  try {
    await fetch(`${apiBase}/friend/send`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
  } catch (err) {
    statusEl.textContent = `send failed (${err.message})`;
    statusEl.className = "bad";
  }
  poll();
});

// Live pipeline status: shows each stage (relaying -> intent -> matching ->
// drafting -> awaiting approval -> resolved) as it happens on the backend, so
// the LLM latency reads as visible progress instead of a silent stall.
const pipelineEl = document.getElementById("pipeline");
const pipelineLogEl = document.getElementById("pipelineLog");
const pipelineToggleBtn = document.getElementById("pipelineToggle");
let pipelineSince = 0;
let pipelineManuallyClosed = false;

function pipelineOpen(open) {
  pipelineEl.classList.toggle("open", open);
  pipelineToggleBtn.textContent = `🔎 Pipeline status ${open ? "▴" : "▾"}`;
}
pipelineToggleBtn.onclick = () => {
  const open = !pipelineEl.classList.contains("open");
  pipelineManuallyClosed = !open;
  pipelineOpen(open);
};

async function pollPipeline() {
  try {
    const res = await fetch(`${apiBase}/pipeline/events?since=${pipelineSince}`, { cache: "no-store" });
    if (!res.ok) return;
    const data = await res.json();
    pipelineSince = data.since ?? pipelineSince;
    if (data.events && data.events.length) {
      for (const e of data.events) {
        const line = document.createElement("div");
        line.textContent = e.message;
        pipelineLogEl.appendChild(line);
      }
      // Keep only the last 20 lines, mark the newest.
      while (pipelineLogEl.children.length > 20) pipelineLogEl.removeChild(pipelineLogEl.firstChild);
      [...pipelineLogEl.children].forEach((c, i, arr) => c.classList.toggle("latest", i === arr.length - 1));
      pipelineLogEl.scrollTop = pipelineLogEl.scrollHeight;
      if (!pipelineManuallyClosed) pipelineOpen(true);
    }
  } catch (err) {
    // Pipeline visualizer is a nice-to-have — fail silently if unreachable.
  }
}

poll();
pollPipeline();
setInterval(poll, 1500);
setInterval(pollPipeline, 1000);
</script>
</body>
</html>
